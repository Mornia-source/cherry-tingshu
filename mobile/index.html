<!-- 顶栏 -->
<header class="topbar">
  <div class="brand"><svg class="app-logo"><use href="#cherry-logo"></use></svg> 樱桃听书</div>
  <button class="icon-btn" id="btn-theme" title="明暗"><i class="fas fa-moon"></i></button>
</header>

<!-- 书架 -->
<main id="view-library" class="view">
  <div class="lib-actions">
    <label class="btn primary block"><i class="fas fa-file-import"></i> 导入听书包(.zip)
      <input type="file" id="import-input" accept=".zip,.tsp" hidden></label>
    <p class="hint">从电脑端「设置 - 本地预训练音频管理」点「手机包」导出，再传到手机导入。</p>
  </div>
  <div id="book-list" class="book-list"></div>
</main>

<!-- 阅读器 -->
<main id="view-reader" class="view hidden">
  <div class="reader-head">
    <button class="icon-btn" id="btn-back"><i class="fas fa-chevron-left"></i></button>
    <div class="reader-title" id="reader-title"></div>
    <button class="icon-btn" id="btn-del-book" title="删除此书"><i class="fas fa-trash"></i></button>
  </div>
  <div id="sentences" class="sentences"></div>
  <div class="player">
    <button class="icon-btn" id="btn-prev"><i class="fas fa-backward-step"></i></button>
    <button class="play-btn" id="btn-play"><i class="fas fa-play"></i></button>
    <button class="icon-btn" id="btn-next"><i class="fas fa-forward-step"></i></button>
    <span class="progress" id="progress"></span>
  </div>
</main>

<!-- 设置 -->
<main id="view-settings" class="view hidden">
  <div class="card">
    <h3>主题色</h3>
    <div class="theme-row" id="theme-presets"></div>
  </div>
  <div class="card">
    <h3>字号</h3>
    <input type="range" id="font-range" min="16" max="28" step="1">
    <span id="font-val" class="hint"></span>
  </div>
  <div class="card">
    <h3>关于</h3>
    <p class="hint">樱桃听书 手机版 · 仅阅读 + 播放预生成音频，不含合成与训练。</p>
  </div>
</main>

<!-- 底部导航 -->
<nav class="tabbar">
  <button class="tab active" data-view="library"><i class="fas fa-book"></i><span>书架</span></button>
  <button class="tab" data-view="settings"><i class="fas fa-gear"></i><span>设置</span></button>
</nav>

<audio id="audio" preload="auto"></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
